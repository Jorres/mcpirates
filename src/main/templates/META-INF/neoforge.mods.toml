modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${mod_license}"
issueTrackerURL = ""

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_author}"
description = '''${mod_description}'''

# --- Required dependencies ---

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "create"
type = "required"
versionRange = "[${create_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "sable"
type = "required"
versionRange = "[${sable_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "flywheel"
type = "required"
versionRange = "[${flywheel_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "aeronautics"
type = "required"
versionRange = "[${aeronautics_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "lithostitched"
type = "required"
versionRange = "[${lithostitched_mod_version},)"
ordering = "BEFORE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "createbigcannons"
type = "required"
versionRange = "[${cbc_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "patchouli"
type = "required"
versionRange = "[${patchouli_mod_version},)"
ordering = "AFTER"
side = "BOTH"

# Mixin: pin gametest arena positions at world origin. Without this the vanilla
# MC GameTestServer randomises test positions across a 30-million-block range,
# and rapier (Sable's f32-precision physics engine) can't integrate sub-block
# velocity changes at those world coordinates — so airships placed in tests
# never visibly rise even with totalLift > mass*gravity. See
# com.mcpirates.gametest.mixin.GameTestServerMixin for the patch + comment.
[[mixins]]
config = "mcpirates.mixins.json"
