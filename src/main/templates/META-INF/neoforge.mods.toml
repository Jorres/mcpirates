modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${mod_license}"
issueTrackerURL = ""

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_author}"
description = '''${mod_description}'''

# --- Required dependencies ---

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "create"
type = "required"
versionRange = "[${create_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "sable"
type = "required"
versionRange = "[${sable_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "flywheel"
type = "required"
versionRange = "[${flywheel_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "aeronautics"
type = "required"
versionRange = "[${aeronautics_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "lithostitched"
type = "required"
versionRange = "[${lithostitched_mod_version},)"
ordering = "BEFORE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "createbigcannons"
type = "required"
versionRange = "[${cbc_mod_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "patchouli"
type = "required"
versionRange = "[${patchouli_mod_version},)"
ordering = "AFTER"
side = "BOTH"

# Mixin: CBC big-cannon block-impact policy — PENETRATE → STOP so a single shot breaks at
# most one block. See com.mcpirates.cannons.mixin.AbstractBigCannonProjectileMixin.
[[mixins]]
config = "mcpirates.cannons.mixins.json"

# The gametest-only mixin config (mcpirates.mixins.json) is declared by a separate mod id
# (mcpirates_gametest) whose own neoforge.mods.toml lives in src/gameTest/resources/META-INF/.
# That second mod only exists on the classpath in dev runs; the production jar excludes it
# entirely. See build.gradle's `neoForge.mods` block.
